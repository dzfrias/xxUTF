name: Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0

    - name: Run testsuite
      run: |
        zig build test
