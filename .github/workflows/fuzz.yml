name: Fuzz Testing

on:
  push:
    branches: [main]

jobs:
  fuzz:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install ICU4C
      run: |
        sudo apt-get install -y libicu-dev
        # Verify installation
        pkg-config --modversion icu-uc

    - name: Install Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.14.1

    - name: Build the amalgamation
      run: |
        zig build amalgamate
    
    - name: Run AFL++
      run: |
        docker run --rm \
          --user $(id -u):$(id -g) \
          -v ${{ github.workspace }}:/src \
          -w /src \
          aflplusplus/aflplusplus:latest \
          bash -c "
            afl-cc -O3 -flto=full -o target -I. zig-out/amalgamation.c test/fuzz.c
            timeout 1 afl-fuzz -i test/corpus -o output -- ./target || true
          "

    - name: Rename fuzzing outputs
      run: |
        find ./output -name "*:*" -type f | while read -r file; do
            dir=$(dirname "$file")
            base=$(basename "$file")
            newname="${base//:/−}"
            echo "Renaming $file to $dir/newname"
            mv "$file" "$dir/$newname"
        done
          
    - name: Upload fuzzing results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fuzzing-results
        path: output/
        retention-days: 30
