name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build amalgamation
        run: zig build amalgamate

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stage release artifacts
        run: |
          mkdir -p xxutf-amalgamation-${{ steps.version.outputs.tag }}
          cp zig-out/amalgamation.c xxutf-amalgamation-${{ steps.version.outputs.tag }}/xxutf.c
          cp zig-out/include/xxutf.h xxutf-amalgamation-${{ steps.version.outputs.tag }}/xxutf.h

      - name: Zip artifacts
        run: zip -r xxutf-amalgamation.zip xxutf-amalgamation-${{ steps.version.outputs.tag }}/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Version ${{ steps.version.outputs.tag }}" \
            --notes "" \
            xxutf-amalgamation.zip
