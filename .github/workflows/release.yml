name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build amalgamation
        run: zig build amalgamate

      - name: Stage release artifacts
        run: |
          mkdir -p xxutf-amalgamation-${{ github.ref_name#v }}
          cp zig-out/amalgamation.c xxutf-amalgamation-${{ github.ref_name#v }}/xxutf.c
          cp zig-out/include/xxutf.h xxutf-amalgamation-${{ github.ref_name#v }}/xxutf.h

      - name: Zip artifacts
        run: zip -r xxutf-amalgamation.zip xxutf-amalgamation-${{ github.ref_name#v }}/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Version ${{ github.ref_name#v }}" \
            --notes "" \
            xxutf-amalgamation.zip
